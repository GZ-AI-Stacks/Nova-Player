<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFAA"/>
      <stop offset="50%" stop-color="#00B4FF"/>
      <stop offset="100%" stop-color="#8C00FF"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.45"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.25"/>

  <g stroke="url(#ring)" stroke-width="3" opacity="0.7">
    <line x1="256" y1="46" x2="256" y2="70"/>
    <line x1="256" y1="442" x2="256" y2="466"/>
    <line x1="46" y1="256" x2="70" y2="256"/>
    <line x1="442" y1="256" x2="466" y2="256"/>
  </g>

  <rect x="196" y="196" width="120" height="120" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5" transform="rotate(45 256 256)"/>

  <text x="256" y="278" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="70" font-weight="700" text-anchor="middle" letter-spacing="6" fill="#00FFAA">NOVA</text>
  <line x1="196" y1="304" x2="316" y2="304" stroke="url(#ring)" stroke-width="2" opacity="0.7"/>
  <text x="256" y="330" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="17" font-weight="400" text-anchor="middle" letter-spacing="4" opacity="0.8" fill="#00B4FF">PLAYER</text>
</svg>
