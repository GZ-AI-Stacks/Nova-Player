<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ringM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFAA"/>
      <stop offset="50%" stop-color="#00B4FF"/>
      <stop offset="100%" stop-color="#8C00FF"/>
    </linearGradient>
    <radialGradient id="bgGradM" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background required for maskable icons (OS may crop to circle/squircle) -->
  <rect width="512" height="512" fill="url(#bgGradM)"/>

  <!-- content kept inside the ~80% safe-zone circle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ringM)" stroke-width="3" opacity="0.45"/>
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#ringM)" stroke-width="2" opacity="0.25"/>

  <rect x="216" y="216" width="80" height="80" fill="none" stroke="url(#ringM)" stroke-width="2" opacity="0.5" transform="rotate(45 256 256)"/>

  <text x="256" y="270" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="52" font-weight="700" text-anchor="middle" letter-spacing="4" fill="#00FFAA">NOVA</text>
  <line x1="216" y1="290" x2="296" y2="290" stroke="url(#ringM)" stroke-width="2" opacity="0.7"/>
  <text x="256" y="310" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="13" font-weight="400" text-anchor="middle" letter-spacing="3" opacity="0.8" fill="#00B4FF">PLAYER</text>
</svg>
